<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt; height: 405pt; position: relative;
      font-family: 'Pretendard', sans-serif;
      word-break: keep-all; text-wrap: pretty;
      background: #FFFFFF; color: #111827;
      display: flex; overflow: hidden;
    }
    .left {
      width: 55%; padding: 36pt 0 32pt 48pt;
      display: flex; flex-direction: column;
    }
    .eyebrow {
      font-size: 10pt; font-weight: 700; letter-spacing: 2.5pt;
      color: #4F46E5;
    }
    .titlewrap { flex: 1; display: flex; flex-direction: column; justify-content: center; }
    h1 { font-size: 56pt; font-weight: 800; letter-spacing: -0.02em; line-height: 1.25; }
    .subtitle { font-size: 18pt; font-weight: 600; color: #111827; margin-top: 16pt; }
    .caption { font-size: 13pt; color: #6B7280; margin-top: 10pt; line-height: 1.5; }
    .footer { display: flex; gap: 48pt; }
    .footer p.k { font-size: 10pt; color: #9CA3AF; margin-bottom: 3pt; }
    .footer p.v { font-size: 12pt; font-weight: 600; color: #111827; }
    .right { width: 45%; position: relative; }
    .right img {
      position: absolute; inset: 0;
      width: 100%; height: 100%; object-fit: cover;
    }
    .right .fade {
      position: absolute; inset: 0;
      background: linear-gradient(90deg, #FFFFFF 0%, rgba(255,255,255,0) 22%);
    }
  </style>
</head>
<body>
  <div class="left">
    <p class="eyebrow">ANTHROPIC · DEVELOPER TOOLS</p>
    <div class="titlewrap">
      <h1>Claude Code</h1>
      <p class="subtitle">터미널에서 일하는 AI 코딩 에이전트</p>
      <p class="caption">코드를 읽고, 고치고, 실행해 검증하는 개발 파트너</p>
    </div>
    <div class="footer">
      <div><p class="k">Session</p><p class="v">사내 개발자 소개 세션</p></div>
      <div><p class="k">Date</p><p class="v">2026. 07</p></div>
    </div>
  </div>
  <div class="right">
    <img src="./assets/cover-hero.png" alt="terminal illustration">
    <div class="fade"></div>
  </div>
</body>
</html>
