<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt; height: 405pt; position: relative;
      font-family: 'Pretendard', sans-serif;
      word-break: keep-all; text-wrap: pretty;
      background: #FFFFFF; color: #111827;
      padding: 36pt 48pt 32pt;
      display: flex; flex-direction: column;
    }
    .eyebrow { font-size: 10pt; font-weight: 700; letter-spacing: 2.5pt; color: #4F46E5; }
    h2 { font-size: 30pt; font-weight: 800; letter-spacing: -0.01em; margin-top: 12pt; }
    .grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 0 44pt; align-content: center; }
    .case { padding: 13pt 0; border-bottom: 1px solid #E5E7EB; }
    .case h3 { font-size: 14.5pt; font-weight: 700; margin-bottom: 3pt; }
    .case p { font-size: 12.5pt; color: #6B7280; line-height: 1.5; }
    .meta {
      margin-top: 6pt; background: #F7F8FC; border: 1.5pt solid #E0E3F8; border-radius: 10pt;
      padding: 13pt 18pt; display: flex; align-items: center; gap: 12pt;
    }
    .meta .ic { width: 18pt; height: 18pt; color: #4F46E5; flex: none; }
    .meta .ic svg { width: 100%; height: 100%; }
    .meta p { font-size: 13pt; color: #111827; line-height: 1.5; }
    .meta strong { color: #4F46E5; }
    .pagenum { position: absolute; right: 40pt; bottom: 24pt; font-size: 10pt; color: #9CA3AF; }
  </style>
</head>
<body>
  <p class="eyebrow">03 · 핵심 기능</p>
  <h2>이런 일에 씁니다</h2>
  <div class="grid">
    <div class="case"><h3>버그 수정</h3><p>재현 → 원인 추적 → 수정 → 회귀 테스트까지 한 번에</p></div>
    <div class="case"><h3>리팩토링</h3><p>테스트 통과를 유지하며 구조 개선</p></div>
    <div class="case"><h3>PR 리뷰</h3><p>변경 diff에서 버그 · 개선점을 자동 리포트</p></div>
    <div class="case"><h3>테스트 · 문서화</h3><p>커버리지 채우기, README와 주석 정리</p></div>
  </div>
  <div class="meta">
    <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3Z"/></svg></div>
    <p><strong>이 발표자료도 Claude Code가 만들었습니다.</strong> 기획 → 슬라이드 디자인 → 이미지 생성 → 검증 → PDF 변환까지 전 과정 자동.</p>
  </div>
  <p class="pagenum">10</p>
</body>
</html>
