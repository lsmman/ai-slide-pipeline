<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt; height: 405pt; position: relative;
      font-family: 'Pretendard', sans-serif;
      word-break: keep-all; text-wrap: pretty;
      background: #FFFFFF; color: #111827;
      padding: 36pt 48pt 32pt;
      display: flex; flex-direction: column;
    }
    .eyebrow { font-size: 10pt; font-weight: 700; letter-spacing: 2.5pt; color: #4F46E5; }
    h2 { font-size: 30pt; font-weight: 800; letter-spacing: -0.01em; margin-top: 12pt; }
    .cols { flex: 1; display: flex; gap: 32pt; align-items: stretch; padding-top: 24pt; }
    .col { flex: 1; border-top: 2.5pt solid #4F46E5; padding-top: 16pt; display: flex; flex-direction: column; }
    .col .tag { font-size: 10pt; font-weight: 700; letter-spacing: 1.5pt; color: #4F46E5; margin-bottom: 8pt; }
    .col h3 { font-size: 19pt; font-weight: 800; margin-bottom: 8pt; }
    .col p.d { font-size: 13pt; color: #6B7280; line-height: 1.6; margin-bottom: 14pt; }
    .col ul { list-style: none; margin-top: auto; }
    .col li { font-size: 12pt; color: #374151; padding: 5pt 0 5pt 14pt; position: relative; }
    .col li::before { content: ""; position: absolute; left: 0; top: 10pt; width: 5pt; height: 5pt; border-radius: 50%; background: #C7CBF2; }
    .pagenum { position: absolute; right: 40pt; bottom: 24pt; font-size: 10pt; color: #9CA3AF; }
  </style>
</head>
<body>
  <p class="eyebrow">03 · 핵심 기능</p>
  <h2>필요한 만큼 확장합니다</h2>
  <div class="cols">
    <div class="col">
      <p class="tag">SKILLS</p>
      <h3>반복 워크플로우</h3>
      <p class="d">자주 하는 절차를 스킬로 저장하면 슬래시 명령 하나로 재실행</p>
      <ul>
        <li>배포 체크리스트</li>
        <li>회의록 정리, 주간 보고</li>
      </ul>
    </div>
    <div class="col">
      <p class="tag">MCP</p>
      <h3>외부 도구 연결</h3>
      <p class="d">Model Context Protocol로 사내외 시스템을 함수처럼 호출</p>
      <ul>
        <li>GitHub · Slack · Notion</li>
        <li>사내 DB, 내부 API</li>
      </ul>
    </div>
    <div class="col">
      <p class="tag">HOOKS</p>
      <h3>이벤트 자동화</h3>
      <p class="d">저장 · 커밋 같은 이벤트에 규칙을 걸어 자동 실행</p>
      <ul>
        <li>편집 후 포매터 · 린터</li>
        <li>커밋 전 테스트 강제</li>
      </ul>
    </div>
  </div>
  <p class="pagenum">07</p>
</body>
</html>
