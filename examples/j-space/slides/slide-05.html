<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt; height: 405pt; position: relative;
      font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
      word-break: keep-all; text-wrap: pretty;
      background: #FFFFFF; color: #0F172A;
      padding: 34pt 52pt 30pt;
      display: flex; flex-direction: column;
    }
    .headrule { height: 2pt; flex-shrink: 0; background: #10243E; margin-bottom: 14pt; }
    .eyebrow { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 10.5pt; letter-spacing: 2pt; color: #64748B; }
    h2 { font-size: 28pt; font-weight: 800; letter-spacing: -0.02em; margin-top: 8pt; padding-bottom: 7pt; }
    .stats { flex: 1; display: flex; align-items: center; gap: 26pt; }
    .stat { flex: 1; background: #F4F6F9; padding: 22pt 24pt; }
    .stat .num { font-size: 46pt; font-weight: 800; letter-spacing: -0.02em; line-height: 1.25; }
    .stat .unit { font-size: 15pt; font-weight: 700; color: #A67C37; margin-left: 3pt; }
    .stat .cap { font-size: 12.5pt; color: #64748B; margin-top: 8pt; line-height: 1.55; }
    .foot { flex-shrink: 0; border-top: 1px solid #D8DEE6; padding-top: 9pt; display: flex; justify-content: space-between; }
    .foot p { font-size: 10.5pt; color: #64748B; }
    .foot p.pg { font-family: ui-monospace, 'SF Mono', Menlo, monospace; }
  </style>
</head>
<body>
  <div class="headrule"></div>
  <p class="eyebrow">02 / 핵심 숫자</p>
  <h2>작지만, 전부와 연결돼 있다</h2>
  <div class="stats">
    <div class="stat"><p><span class="num">&lt;10</span><span class="unit">%</span></p><p class="cap">전체 신경 활동 중 <span style="white-space:nowrap">J-space가</span> 차지하는 비중 — 좁은 채널</p></div>
    <div class="stat"><p><span class="num">~100</span><span class="unit">배</span></p><p class="cap">일반 패턴 대비 읽기·쓰기 연결 규모 — '방송 허브'의 구조적 증거</p></div>
    <div class="stat"><p><span class="num">수십</span><span class="unit">개</span></p><p class="cap">동시에 활성화되는 개념 수 — 인간 작업기억처럼 소수만 올라온다</p></div>
  </div>
  <div class="foot"><p>수치: Anthropic 연구 원문</p><p class="pg">05</p></div>
</body>
</html>
