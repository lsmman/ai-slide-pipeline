<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt; height: 405pt; position: relative;
      font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
      word-break: keep-all; text-wrap: pretty;
      background: #FFFFFF; color: #0F172A;
      padding: 34pt 52pt 30pt;
      display: flex; flex-direction: column;
    }
    .headrule { height: 2pt; flex-shrink: 0; background: #10243E; margin-bottom: 14pt; }
    .eyebrow { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 10.5pt; letter-spacing: 2pt; color: #64748B; }
    h2 { font-size: 28pt; font-weight: 800; letter-spacing: -0.02em; margin-top: 8pt; padding-bottom: 7pt; }
    h2 .u { border-bottom: 3pt solid #A67C37; padding-bottom: 2pt; }
    .tablewrap { flex: 1; display: flex; align-items: center; }
    table { width: 100%; border-collapse: collapse; background: #F4F6F9; }
    th { background: #10243E; color: #FFFFFF; font-size: 13pt; font-weight: 700; text-align: left; padding: 9pt 16pt; }
    td { font-size: 13pt; padding: 9pt 16pt; border-bottom: 1px solid #D8DEE6; color: #334155; }
    td.k { font-weight: 700; color: #0F172A; width: 200pt; }
    td.v { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 12pt; width: 120pt; }
    tr:last-child td { border-bottom: none; }
    .note { padding-top: 12pt; font-size: 13pt; color: #334155; line-height: 1.6; }
    .note strong { color: #0F172A; }
    .foot { flex-shrink: 0; border-top: 1px solid #D8DEE6; margin-top: 12pt; padding-top: 9pt; display: flex; justify-content: space-between; }
    .foot p { font-size: 10.5pt; color: #64748B; }
    .foot p.pg { font-family: ui-monospace, 'SF Mono', Menlo, monospace; }
  </style>
</head>
<body>
  <div class="headrule"></div>
  <p class="eyebrow">03 / 실험 ② 삭제</p>
  <h2>지우면 <span class="u">무엇이 무너지나</span></h2>
  <div class="tablewrap">
    <table>
      <tr><th>작업</th><th>J-space 제거 후</th><th style="width:120pt">판정</th></tr>
      <tr><td class="k">유창한 말하기 · 문법</td><td>대체로 유지</td><td class="v">유지</td></tr>
      <tr><td class="k">감정 분류 · 객관식</td><td>유지</td><td class="v">유지</td></tr>
      <tr><td class="k">다단계 추론</td><td>성능이 사실상 0으로 붕괴</td><td class="v">붕괴 ≈0</td></tr>
      <tr><td class="k">요약 · 운문 작성</td><td>크게 저하</td><td class="v">저하</td></tr>
    </table>
  </div>
  <p class="note"><strong>새로운 사고에만 작업공간이 필요하다.</strong> 반사적 처리는 살아남고, 단계를 쌓는 추론만 무너졌다 — 인간의 의식·무의식 분업과 같은 패턴.</p>
  <div class="foot"><p>방법: J-space 패턴 일괄 비활성화</p><p class="pg">07</p></div>
</body>
</html>
