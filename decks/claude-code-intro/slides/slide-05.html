<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt; height: 405pt; position: relative;
      font-family: 'Pretendard', sans-serif;
      word-break: keep-all; text-wrap: pretty;
      background: #FFFFFF; color: #111827;
      padding: 36pt 48pt 32pt;
      display: flex; gap: 48pt;
    }
    .left { width: 230pt; display: flex; flex-direction: column; }
    .eyebrow { font-size: 10pt; font-weight: 700; letter-spacing: 2.5pt; color: #4F46E5; }
    h2 { font-size: 30pt; font-weight: 800; letter-spacing: -0.01em; margin-top: 12pt; line-height: 1.2; }
    .left p.lead { font-size: 13pt; color: #6B7280; line-height: 1.65; margin-top: 16pt; }
    .right { flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .tool { display: flex; align-items: center; gap: 14pt; padding: 11pt 0; border-bottom: 1px solid #E5E7EB; }
    .tool:last-child { border-bottom: none; }
    .ic { width: 22pt; height: 22pt; flex: none; color: #4F46E5; }
    .ic svg { width: 100%; height: 100%; }
    .tool h3 { font-size: 14.5pt; font-weight: 700; width: 128pt; }
    .tool p { font-size: 12.5pt; color: #6B7280; }
    .pagenum { position: absolute; right: 40pt; bottom: 24pt; font-size: 10pt; color: #9CA3AF; }
  </style>
</head>
<body>
  <div class="left">
    <p class="eyebrow">02 · 어떻게 동작하나</p>
    <h2>개발자의 도구를<br>그대로 씁니다</h2>
    <p class="lead">별도 플랫폼이 아니라, 여러분이 매일 쓰는 도구 위에서 움직입니다.</p>
  </div>
  <div class="right">
    <div class="tool">
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M10.4 12.6a2 2 0 1 1 3 3L8 21l-4 1 1-4Z"/></svg></div>
      <h3>파일 읽기 · 편집</h3>
      <p>코드베이스를 열어 필요한 부분만 정확히 수정</p>
    </div>
    <div class="tool">
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" x2="20" y1="19" y2="19"/></svg></div>
      <h3>터미널 실행</h3>
      <p>빌드 · 테스트 · git — 셸 명령을 직접 실행</p>
    </div>
    <div class="tool">
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></div>
      <h3>코드 검색</h3>
      <p>수만 파일에서도 관련 코드를 빠르게 탐색</p>
    </div>
    <div class="tool">
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/><path d="M2 12h20"/></svg></div>
      <h3>웹 · 문서 접근</h3>
      <p>라이브러리 문서와 최신 정보를 찾아 반영</p>
    </div>
    <div class="tool">
      <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
      <h3>서브에이전트</h3>
      <p>탐색 · 리뷰 같은 하위 작업을 별도 에이전트에 위임</p>
    </div>
  </div>
  <p class="pagenum">05</p>
</body>
</html>
