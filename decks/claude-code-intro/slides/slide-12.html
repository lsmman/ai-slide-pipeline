<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt; height: 405pt; position: relative;
      font-family: 'Pretendard', sans-serif;
      word-break: keep-all; text-wrap: pretty;
      color: #FFFFFF; position: relative; overflow: hidden;
      display: flex; flex-direction: column; justify-content: center;
      padding: 0 48pt; background: #0E1330;
    }
    .bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
    .content { position: relative; z-index: 1; }
    h1 { font-size: 46pt; font-weight: 800; letter-spacing: -0.02em; }
    .subtitle { font-size: 16pt; font-weight: 600; margin-top: 14pt; color: #E3E5FF; }
    .caption { font-size: 13pt; color: #A5AAD9; margin-top: 8pt; }
    .cta {
      margin-top: 26pt; display: inline-flex; align-items: center; gap: 10pt;
    }
    .cta code {
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 13pt; color: #FFFFFF; background: rgba(255,255,255,0.10);
      border: 1px solid rgba(255,255,255,0.25); border-radius: 8pt; padding: 8pt 14pt;
    }
    .cta p { font-size: 12.5pt; color: #A5AAD9; }
  </style>
</head>
<body>
  <img class="bg" src="./assets/closing-bg.png" alt="">
  <div class="content">
    <h1>감사합니다</h1>
    <p class="subtitle">오늘 바로 한 번 써보세요 — 작은 작업 하나면 충분합니다</p>
    <p class="caption">Claude Code 소개 · 사내 개발자 세션 · 2026. 07</p>
    <div class="cta">
      <code>npm install -g @anthropic-ai/claude-code</code>
      <p>docs.anthropic.com/claude-code</p>
    </div>
  </div>
</body>
</html>
