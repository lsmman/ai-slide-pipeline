<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt; height: 405pt; position: relative;
      font-family: 'Pretendard', sans-serif;
      word-break: keep-all; text-wrap: pretty;
      background: #FFFFFF; color: #111827;
      padding: 36pt 48pt 32pt;
      display: flex; flex-direction: column;
    }
    .eyebrow { font-size: 10pt; font-weight: 700; letter-spacing: 2.5pt; color: #4F46E5; }
    h2 { font-size: 30pt; font-weight: 800; letter-spacing: -0.01em; margin-top: 12pt; }
    .flowwrap { flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .flow { display: flex; align-items: center; justify-content: space-between; }
    .node {
      width: 108pt; padding: 16pt 0; text-align: center;
      border: 1.5pt solid #E5E7EB; border-radius: 10pt; background: #F7F8FC;
    }
    .node.hot { background: #4F46E5; border-color: #4F46E5; }
    .node.hot h3, .node.hot p { color: #FFFFFF; }
    .node h3 { font-size: 15pt; font-weight: 700; }
    .node p { font-size: 12pt; color: #6B7280; margin-top: 3pt; }
    .arrow { font-size: 14pt; color: #9CA3AF; }
    .loopback {
      margin: 14pt 52pt 0 auto; width: 316pt;
      border: 1.5pt dashed #C7CBF2; border-top: none; border-radius: 0 0 10pt 10pt;
      height: 16pt; position: relative;
    }
    .loopback p {
      position: absolute; left: 50%; transform: translateX(-50%); top: 8pt;
      background: #FFFFFF; padding: 0 8pt;
      font-size: 12pt; color: #4F46E5; font-weight: 600; white-space: nowrap;
    }
    .note { font-size: 13.5pt; color: #6B7280; line-height: 1.6; margin-top: 26pt; }
    .note strong { color: #111827; }
    .pagenum { position: absolute; right: 40pt; bottom: 24pt; font-size: 10pt; color: #9CA3AF; }
  </style>
</head>
<body>
  <p class="eyebrow">02 · 어떻게 동작하나</p>
  <h2>에이전트 루프</h2>
  <div class="flowwrap">
    <div class="flow">
      <div class="node"><h3>탐색</h3><p>코드베이스 파악</p></div>
      <p class="arrow">→</p>
      <div class="node"><h3>계획</h3><p>작업 분해</p></div>
      <p class="arrow">→</p>
      <div class="node"><h3>편집</h3><p>파일 수정</p></div>
      <p class="arrow">→</p>
      <div class="node"><h3>실행</h3><p>빌드 · 테스트</p></div>
      <p class="arrow">→</p>
      <div class="node hot"><h3>검증</h3><p>결과 확인</p></div>
    </div>
    <div class="loopback"><p>실패하면 스스로 다시 편집 → 재검증</p></div>
    <p class="note"><strong>사람이 개입하는 지점은 지시와 승인뿐.</strong> 중간의 시행착오는 에이전트가 알아서 반복합니다.</p>
  </div>
  <p class="pagenum">04</p>
</body>
</html>
