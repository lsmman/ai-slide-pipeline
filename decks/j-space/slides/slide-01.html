<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt; height: 405pt; position: relative;
      font-family: 'Pretendard', 'Noto Sans KR', sans-serif;
      word-break: keep-all; text-wrap: pretty;
      background: #10243E; color: #FFFFFF;
      padding: 40pt 52pt 34pt;
      display: flex; flex-direction: column;
    }
    .eyebrow { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 10.5pt; letter-spacing: 2.5pt; color: #B8C4D4; padding-bottom: 7pt; }
    .eyebrow .u { border-bottom: 3pt solid #A67C37; padding-bottom: 3pt; color: #FFFFFF; }
    .titlewrap { flex: 1; display: flex; flex-direction: column; justify-content: center; }
    h1 { font-size: 42pt; font-weight: 800; letter-spacing: -0.02em; line-height: 1.22; max-width: 600pt; }
    .subtitle { font-size: 15pt; font-weight: 400; color: #B8C4D4; margin-top: 16pt; line-height: 1.6; max-width: 560pt; }
    .strip { border-top: 1px solid #B8C4D4; padding-top: 10pt; display: flex; justify-content: space-between; }
    .strip p { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 10.5pt; color: #B8C4D4; letter-spacing: 1.5pt; }
  </style>
</head>
<body>
  <p class="eyebrow"><span class="u">ANTHROPIC RESEARCH</span> · BRIEFING</p>
  <div class="titlewrap">
    <h1>언어 모델 안의<br>전역 작업공간</h1>
    <p class="subtitle">J-space — 모델이 '말하기 전에 떠올리는 것'을 읽고, 바꾸고, 지워본 연구</p>
  </div>
  <div class="strip"><p>A GLOBAL WORKSPACE IN LANGUAGE MODELS</p><p>2026. 07</p></div>
</body>
</html>
