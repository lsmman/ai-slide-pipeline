<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt; height: 405pt; position: relative;
      font-family: 'Pretendard', sans-serif;
      word-break: keep-all; text-wrap: pretty;
      background: #FFFFFF; color: #111827;
      padding: 36pt 48pt 32pt;
      display: flex; flex-direction: column;
    }
    .eyebrow { font-size: 10pt; font-weight: 700; letter-spacing: 2.5pt; color: #4F46E5; }
    h2 { font-size: 30pt; font-weight: 800; letter-spacing: -0.01em; margin-top: 12pt; }
    .flowwrap { flex: 1; display: flex; flex-direction: column; justify-content: center; }
    .flow { display: flex; align-items: center; justify-content: space-between; }
    .node { width: 88pt; padding: 13pt 0; text-align: center; border: 1.5pt solid #E5E7EB; border-radius: 10pt; background: #F7F8FC; }
    .node.hot { background: #4F46E5; border-color: #4F46E5; }
    .node.hot h3, .node.hot p { color: #FFFFFF; }
    .node h3 { font-size: 13.5pt; font-weight: 700; }
    .node p { font-size: 10pt; color: #6B7280; margin-top: 3pt; }
    .arrow { font-size: 13pt; color: #9CA3AF; }
    .loopback {
      margin: 12pt auto 0; width: 300pt;
      border: 1.5pt dashed #C7CBF2; border-top: none; border-radius: 0 0 10pt 10pt;
      height: 14pt; position: relative;
    }
    .loopback p {
      position: absolute; left: 50%; transform: translateX(-50%); top: 6pt;
      background: #FFFFFF; padding: 0 8pt;
      font-size: 10.5pt; color: #4F46E5; font-weight: 600; white-space: nowrap;
    }
    .note { font-size: 13pt; color: #6B7280; line-height: 1.6; margin-top: 24pt; }
    .note strong { color: #111827; }
    .pagenum { position: absolute; right: 40pt; bottom: 24pt; font-size: 10pt; color: #9CA3AF; }
  </style>
</head>
<body>
  <p class="eyebrow">03 · 내부 파이프라인</p>
  <h2>실행되면 벌어지는 6단계</h2>
  <div class="flowwrap">
    <div class="flow">
      <div class="node"><h3>Plan</h3><p>아웃라인·승인</p></div>
      <p class="arrow">→</p>
      <div class="node"><h3>Design</h3><p>HTML+이미지</p></div>
      <p class="arrow">→</p>
      <div class="node"><h3>Validate</h3><p>렌더 린트</p></div>
      <p class="arrow">→</p>
      <div class="node hot"><h3>Gate</h3><p>리뷰어 2명</p></div>
      <p class="arrow">→</p>
      <div class="node"><h3>Export</h3><p>PDF·PPTX</p></div>
      <p class="arrow">→</p>
      <div class="node"><h3>Present</h3><p>뷰어·편집</p></div>
    </div>
    <div class="loopback"><p>블로커 발견 시 Design으로 루프백</p></div>
    <p class="note"><strong>Gate가 잠금장치입니다.</strong> 리뷰어 둘이 PASS를 줄 때까지 Export 명령 자체가 거부됩니다.</p>
  </div>
  <p class="pagenum">06</p>
</body>
</html>
