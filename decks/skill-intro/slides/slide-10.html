<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt; height: 405pt; position: relative;
      font-family: 'Pretendard', sans-serif;
      word-break: keep-all; text-wrap: pretty;
      background: #FFFFFF; color: #111827;
      padding: 36pt 48pt 32pt;
      display: flex; flex-direction: column;
    }
    .eyebrow { font-size: 10pt; font-weight: 700; letter-spacing: 2.5pt; color: #4F46E5; }
    h2 { font-size: 30pt; font-weight: 800; letter-spacing: -0.01em; margin-top: 12pt; }
    .steps { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 14pt; max-width: 580pt; }
    .step { display: flex; align-items: center; gap: 18pt; }
    .n { width: 26pt; height: 26pt; flex: none; border-radius: 50%; background: #4F46E5; display: flex; align-items: center; justify-content: center; }
    .n p { color: #FFFFFF; font-size: 12.5pt; font-weight: 700; }
    .step h3 { font-size: 14.5pt; font-weight: 700; width: 128pt; }
    .step code {
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 11pt; color: #374151; background: #F7F8FC;
      border: 1px solid #E5E7EB; border-radius: 6pt; padding: 5pt 10pt;
    }
    .step p.d { font-size: 12.5pt; color: #6B7280; }
    .tip { font-size: 13pt; color: #6B7280; border-top: 1px solid #E5E7EB; padding-top: 13pt; line-height: 1.6; }
    .tip strong { color: #111827; }
    .pagenum { position: absolute; right: 40pt; bottom: 24pt; font-size: 10pt; color: #9CA3AF; }
  </style>
</head>
<body>
  <p class="eyebrow">04 · 호출하기</p>
  <h2>한 줄이면 시작됩니다</h2>
  <div class="steps">
    <div class="step"><div class="n"><p>1</p></div><h3>슬래시 호출</h3><code>/slide-decks-start docs/onboarding.md</code></div>
    <div class="step"><div class="n"><p>2</p></div><h3>자연어 호출</h3><p class="d">"이 문서로 PPT 만들어줘" — 트리거 자동 매칭</p></div>
    <div class="step"><div class="n"><p>3</p></div><h3>아웃라인 승인</h3><p class="d">구성 확인 후 나머지는 자동 (검증·게이트·내보내기)</p></div>
    <div class="step"><div class="n"><p>4</p></div><h3>마지막 편집</h3><code>slides-grab edit</code><p class="d">또는 "n번 슬라이드 고쳐줘"</p></div>
  </div>
  <p class="tip"><strong>산출물.</strong> PDF + 브라우저 뷰어 기본, PPTX는 실험적 변환으로 요청 시 제공. 유저 레벨 스킬이라 어느 프로젝트에서든 동일하게 동작합니다.</p>
  <p class="pagenum">10</p>
</body>
</html>
