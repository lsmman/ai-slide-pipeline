<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt; height: 405pt; position: relative;
      font-family: 'Pretendard', sans-serif;
      word-break: keep-all; text-wrap: pretty;
      background: #FFFFFF; color: #111827;
      padding: 36pt 48pt 32pt;
      display: flex; flex-direction: column;
    }
    .eyebrow { font-size: 10pt; font-weight: 700; letter-spacing: 2.5pt; color: #4F46E5; }
    .statement { flex: 1; display: flex; flex-direction: column; justify-content: center; }
    h2 { font-size: 38pt; font-weight: 800; letter-spacing: -0.02em; line-height: 1.2; }
    h2 .accent { color: #4F46E5; }
    .sub { font-size: 15pt; color: #6B7280; margin-top: 14pt; line-height: 1.6; max-width: 560pt; }
    .points { display: flex; gap: 40pt; padding-top: 20pt; border-top: 1px solid #E5E7EB; }
    .point { flex: 1; }
    .point h3 { font-size: 13.5pt; font-weight: 700; margin-bottom: 4pt; }
    .point p { font-size: 12.5pt; color: #6B7280; line-height: 1.5; }
    .pagenum { position: absolute; right: 40pt; bottom: 24pt; font-size: 10pt; color: #9CA3AF; }
  </style>
</head>
<body>
  <p class="eyebrow">01 · 왜 만들었나</p>
  <div class="statement">
    <h2>잘 만든 파이프라인도<br>세션이 끝나면 <span class="accent">휘발됩니다</span></h2>
    <p class="sub">한 번 통과한 절차와 그 과정에서 밟은 함정들을 스킬 문서로 박제해, 다음 세션이 처음부터 다시 배우지 않게 합니다.</p>
  </div>
  <div class="points">
    <div class="point">
      <h3>수동 조립 반복</h3>
      <p>덱 만들 때마다 렌더·검증·변환을 다시 잇는 비용</p>
    </div>
    <div class="point">
      <h3>함정 재발견</h3>
      <p>같은 실수(조판·크기·경로)를 세션마다 다시 밟음</p>
    </div>
    <div class="point">
      <h3>어디서든 호출</h3>
      <p>유저 레벨 스킬 — 프로젝트 불문 한 줄로 시작</p>
    </div>
  </div>
  <p class="pagenum">03</p>
</body>
</html>
