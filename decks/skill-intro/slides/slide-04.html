<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 720pt; height: 405pt; position: relative;
      font-family: 'Pretendard', sans-serif;
      word-break: keep-all; text-wrap: pretty;
      background: #FFFFFF; color: #111827;
      padding: 36pt 48pt 32pt;
      display: flex; flex-direction: column;
    }
    .eyebrow { font-size: 10pt; font-weight: 700; letter-spacing: 2.5pt; color: #4F46E5; }
    h2 { font-size: 30pt; font-weight: 800; letter-spacing: -0.01em; margin-top: 12pt; }
    .flow { flex: 1; display: flex; align-items: center; gap: 18pt; }
    .stage { flex: 1; border-top: 2.5pt solid #4F46E5; padding-top: 14pt; }
    .stage .tag { font-size: 12pt; font-weight: 800; letter-spacing: 1.5pt; color: #4F46E5; margin-bottom: 8pt; }
    .stage h3 { font-size: 17pt; font-weight: 800; margin-bottom: 6pt; }
    .stage p { font-size: 12.5pt; color: #6B7280; line-height: 1.55; }
    .arrow { font-size: 16pt; color: #9CA3AF; }
    .result { border-top: 1px solid #E5E7EB; padding-top: 14pt; font-size: 13pt; color: #6B7280; line-height: 1.6; }
    .result strong { color: #111827; }
    .pagenum { position: absolute; right: 40pt; bottom: 24pt; font-size: 10pt; color: #9CA3AF; }
  </style>
</head>
<body>
  <p class="eyebrow">02 · 어떻게 만들었나</p>
  <h2>문서에도 TDD를 적용했습니다</h2>
  <div class="flow">
    <div class="stage">
      <p class="tag">RED</p>
      <h3>실패 먼저</h3>
      <p>스킬 없이 파이프라인을 돌리며 실제로 틀린 지점들을 기록</p>
    </div>
    <p class="arrow">→</p>
    <div class="stage">
      <p class="tag">GREEN</p>
      <h3>스킬 작성 + 검증</h3>
      <p>실패 기록을 겨냥해 작성, 서브에이전트에 스킬만 주고 드라이런 시험</p>
    </div>
    <p class="arrow">→</p>
    <div class="stage">
      <p class="tag">REFACTOR</p>
      <h3>갭 봉합</h3>
      <p>시험에서 드러난 모호점 6개를 수정하고 재시험으로 해소 확인</p>
    </div>
  </div>
  <p class="result"><strong>결과: 재시험 프로브 전 항목 정답.</strong> 스킬의 규칙은 전부 실측 기반 — 상상으로 쓴 조항이 없습니다.</p>
  <p class="pagenum">04</p>
</body>
</html>
